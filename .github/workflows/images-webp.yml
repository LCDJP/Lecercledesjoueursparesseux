name: Optimiser les images WebP

on:
  workflow_dispatch:
  push:
    paths:
      - "assets/images/galerie/**.jpg"
      - "assets/images/galerie/**.jpeg"
      - "assets/images/galerie/**.png"

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install Pillow
      - run: python scripts/convert_images_to_webp.py
      - run: find assets/images/galerie -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) -delete || true
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/images/galerie
          if git diff --cached --quiet; then
            echo "Aucune modification."
          else
            git commit -m "Optimisation automatique des images en WebP"
            git push
          fi
